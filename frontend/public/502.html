<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HostPanel — Restarting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      max-width: 360px;
      padding: 2.5rem 2rem;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #38bdf8;
      letter-spacing: -0.5px;
      margin-bottom: 2rem;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #1e3a5f;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #f1f5f9;
    }
    p {
      font-size: 0.875rem;
      color: #94a3b8;
      line-height: 1.5;
    }
    .counter {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #64748b;
    }
    .counter span {
      color: #38bdf8;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">HostPanel</div>
    <div class="spinner"></div>
    <h1>Server is restarting</h1>
    <p>A package was just installed or removed.<br>The panel will be back in a few seconds.</p>
    <div class="counter">Retrying in <span id="t">3</span>s…</div>
  </div>
  <script>
    var secs = 3;
    var el = document.getElementById('t');
    var iv = setInterval(function () {
      secs--;
      el.textContent = secs;
      if (secs <= 0) {
        clearInterval(iv);
        location.reload();
      }
    }, 1000);
  </script>
</body>
</html>
